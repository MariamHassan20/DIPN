# DIPN configuration — matches the paper (Section 4.3)
# L_total = L_src + lambda_align * L_align + gamma_div * L_div
#
# Data directories are overridden at runtime via CLI:
#   --source_dir, --target_dir, --target_eval_dir

seed: 0

data:
  source_dir:     data/source          # override with --source_dir
  target_dir:     data/target          # override with --target_dir
  target_eval_dir: ~                   # override with --target_eval_dir (optional)
  image_size:     224
  val_split:      0.15                 # 15% stratified source hold-out
  batch_size:     32
  num_workers:    4

model:
  backbone:     efficientnet_b0
  num_classes:  2
  pretrained:   true                   # ImageNet initialisation

checkpoint:
  save_dir: checkpoints/DIPN

# -----------------------------------------------------------------------
# Phase 1 — source consolidation (Section 3.2)
# -----------------------------------------------------------------------
phase1:
  epochs:        100
  lr:            1.0e-3
  weight_decay:  1.0e-4
  focal_gamma:   2.0
  patience:      10                    # early-stopping window
  plateau_delta: 0.002                 # minimum AUC improvement
  mixup:
    enabled: true
    alpha:   0.4
    prob:    0.5

# -----------------------------------------------------------------------
# Phase 2 — prototypical domain adaptation (Section 3.3, Eq. 7)
#   L_total = L_src + lambda_align * L_align + gamma_div * L_div
# -----------------------------------------------------------------------
phase2:
  epochs:        150
  lr:            5.0e-4
  weight_decay:  1.0e-4
  focal_gamma:   2.0

  # Loss weights (fixed across all target domains — paper Section 4.3)
  lambda_align:   1.0   # λ_a  weight on L_align
  gamma_diversity: 1.0  # γ_d  weight on L_div

  # Optional source Mixup during Phase 2 (disabled by default)
  mixup:
    source_enabled: false
    alpha: 0.4
    prob:  0.5

  # Saerens-style label-shift correction (Section 3.3.4)
  correction:
    enabled:       true
    warmup_epochs: 5      # T_w — warmup before correction activates
    ema_momentum:  0.99   # m_w — EMA momentum for target prior estimate
    prior_gap_threshold: 0.05   # τ_π — gate threshold
